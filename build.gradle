plugins {
    id 'java'
    id 'net.fabricmc.fabric-loom' version '1.10.1'
}

sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    maven {
        url 'https://maven.fabricmc.net/'
    }
    mavenCentral()
    google()
    maven {
        url 'https://libraries.minecraft.net/'
    }
}

dependencies {
    modImplementation "net.fabricmc.fabric-api:0.73.1+1.21.2"
    modImplementation "net.fabricmc.fabric-loader:0.14.26"
}

loom {
    accessWidenerPath = file('src/main/resources/accesswidener.snakqclient.aw')
    mixinConfig = file('src/main/resources/mixin.snakqclient.json')
}

processResources {
    inputs.property 'version', project.version
    filteringCharset = 'UTF-8'
    filesMatching('**/mod.json') {
        filter(ReplaceTokens, tokens: [version: project.version])
    }
}
