plugins {
    id 'java'
    id 'fabric-loom' version '1.10.1'
}

sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    maven {
        url 'https://maven.fabricmc.net/'
    }
    mavenCentral()
    google()
    maven {
        url 'https://libraries.minecraft.net/'
    }
}

dependencies {
    implementation 'net.fabricmc:fabric-loader:0.14.23'
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.73.0+1.21.4'
}

loom {
    accessWidenerPath = file('src/main/resources/accesswidener.fabricmc.com')
}
