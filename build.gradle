plugins {
    id 'net.fabricmc.fabric-loom' version '1.10.1'
}

sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    maven {
        url 'https://maven.fabricmc.net/'
    }
    mavenCentral()
    google()
    maven {
        url 'https://libraries.minecraft.net'
    }
}

dependencies {
    modImplementation 'net.fabricmc:fabric-loader:0.14.24'
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.73.1+1.21.4'
    // Add any other mod dependencies here
}
